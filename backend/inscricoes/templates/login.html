<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#0f0f0f;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial, Helvetica, sans-serif;
        }

        .card{
            width:100%;
            max-width:420px;
            background:#171717;
            border:1px solid #2d2d2d;
            border-radius:24px;
            padding:35px;
        }

        h1{
            color:#ffc700;
            margin-bottom:30px;
            text-align:center;
            font-size:34px;
        }

        .campo{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            color:#999;
            font-size:14px;
        }

        input{
            width:100%;
            padding:15px;
            border-radius:12px;
            border:1px solid #333;
            background:#222;
            color:white;
            outline:none;
            font-size:15px;
        }

        input:focus{
            border-color:#ffc700;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#ffc700;
            color:black;
            font-weight:bold;
            font-size:16px;
            cursor:pointer;
            transition:0.2s;
        }

        button:hover{
            transform:translateY(-2px);
        }

        .erro{
            background:#4d1212;
            color:#ff8f8f;
            padding:12px;
            border-radius:10px;
            margin-bottom:20px;
            font-size:14px;
        }

    </style>

</head>

<body>

    <div class="card">

        <h1>Painel Admin</h1>

        {% if form.errors %}

            <div class="erro">
                Usuário ou senha inválidos.
            </div>

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="campo">

                <label>Usuário</label>

                <input 
                    type="text"
                    name="username"
                    required
                >

            </div>

            <div class="campo">

                <label>Senha</label>

                <input 
                    type="password"
                    name="password"
                    required
                >

            </div>

            <button type="submit">
                Entrar
            </button>

        </form>

    </div>

</body>

</html>
